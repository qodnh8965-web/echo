name: Daily Update Material Content

# 触发条件：每天 UTC 时间 00:00（北京时间早上 8:00）自动运行 + 支持手动触发
on:
  schedule:
    - cron: '0 0 * * *'          # 每天 UTC 00:00 执行（可改成 '30 23 * * *' 等其他时间）
  workflow_dispatch:             # 允许你手动在 Actions 页面点击运行

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 步骤1：拉取仓库最新代码
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，便于 commit

      # 步骤2：安装 Node.js（因为我们要跑 JS 脚本）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 稳定版

      # 步骤3：安装脚本需要的依赖（axios 用于请求热榜 API）
      - name: Install dependencies
        run: npm install axios

      # 步骤4：运行更新脚本（update.js）
      - name: Run update script
        run: node update.js

      # 步骤5：如果有改动，就提交并推送（|| echo "No changes" 避免无变更报错）
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Daily auto update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push

      # 步骤6：（可选）如果 Pages 需要手动重新部署，可加此步；大多数情况 GitHub 会自动检测变更
      # 如果你用了 peaceiris/actions-gh-pages，可替换上面 push 步骤
