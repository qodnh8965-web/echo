name: Daily Update Hot Topics

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00 执行（北京时间早上8点）
  workflow_dispatch:      # 支持手动触发（在 Actions 页面点 Run workflow）

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install axios  # 用于请求 API

      - name: Fetch and generate content
        run: node update.js     # 你的更新脚本

      - name: Commit changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Daily update: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
