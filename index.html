<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>每日10条 · 实时热榜素材库（API版）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --text: #ffffff;
      --accent: #10b981;
      --muted: #6b7280;
    }
    [data-theme="light"] {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --accent: #059669;
      --muted: #64748b;
    }
    body { 
      background: var(--bg); 
      color: var(--text); 
      transition: background 0.4s, color 0.4s; 
    }
    .card { 
      background: var(--card); 
      transition: all 0.3s; 
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .modal { animation: pop 0.3s ease-out; }
    @keyframes pop { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    .copy-btn:hover { background-color: var(--accent) !important; color: white !important; }
    .tab-active { border-bottom: 3px solid var(--accent); color: var(--accent); font-weight: bold; }
  </style>
</head>
<body class="min-h-screen transition-colors">

<div class="max-w-7xl mx-auto px-6 py-8">
  <!-- 头部 + 切换 & 刷新 -->
  <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
    <div>
      <h1 class="text-5xl font-bold tracking-tight">每日10条 · 热榜素材</h1>
      <p class="text-lg mt-1 opacity-80">实时抓取抖音/新闻/研生热点 · 自动生成口播+文案</p>
    </div>
    <div class="flex items-center gap-6">
      <button onclick="refreshData()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-full flex items-center gap-2">
        <i class="fas fa-sync-alt"></i> 刷新热榜
      </button>
      <button onclick="toggleTheme()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-full flex items-center gap-2">
        <i class="fas fa-moon"></i> 切换主题
      </button>
      <div id="today" class="text-2xl font-mono font-bold opacity-90"></div>
    </div>
  </div>

  <!-- 分类 Tab -->
  <div class="flex justify-center md:justify-start gap-8 mb-10 border-b border-gray-700 pb-4">
    <button onclick="filterCategory('all')" class="tab-active px-4 py-2">全部</button>
    <button onclick="filterCategory('douyin')" class="px-4 py-2 hover:text-emerald-400">抖音爆款</button>
    <button onclick="filterCategory('news')" class="px-4 py-2 hover:text-emerald-400">新闻热点</button>
    <button onclick="filterCategory('yanjiu')" class="px-4 py-2 hover:text-emerald-400">研究生相关</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="materialGrid"></div>
</div>

<!-- 详情模态框 -->
<div id="modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50 p-4">
  <div class="modal bg-[var(--card)] rounded-3xl max-w-4xl w-full max-h-[90vh] overflow-auto">
    <div class="p-8">
      <div class="flex justify-between items-start mb-6">
        <h2 id="modalTitle" class="text-3xl font-bold"></h2>
        <button onclick="closeModal()" class="text-4xl opacity-70 hover:opacity-100">×</button>
      </div>
      <div id="modalImage" class="rounded-2xl overflow-hidden mb-8 shadow-2xl"></div>
      
      <div class="mb-10">
        <div class="flex items-center gap-3 mb-4 text-[var(--accent)]">
          <i class="fas fa-microphone-lines"></i> <span class="font-semibold">口播文案（抖音/短视频用）</span>
        </div>
        <div id="oralScript" class="bg-zinc-800 p-6 rounded-2xl text-lg leading-relaxed whitespace-pre-wrap"></div>
        <button onclick="copyOral()" class="copy-btn mt-4 px-8 py-4 bg-zinc-700 hover:bg-[var(--accent)] rounded-full flex items-center gap-3 text-sm">
          <i class="fas fa-copy"></i> 复制口播
        </button>
      </div>

      <div>
        <div class="flex items-center gap-3 mb-4 text-[var(--accent)]">
          <i class="fas fa-file-lines"></i> <span class="font-semibold">完整文章（小红书/公众号长文）</span>
        </div>
        <div id="fullArticle" class="prose prose-invert max-w-none text-base leading-relaxed"></div>
      </div>

      <div class="mt-10 flex flex-col sm:flex-row gap-4">
        <button onclick="exportLongImage()" class="flex-1 py-5 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 rounded-2xl font-bold flex items-center justify-center gap-3">
          <i class="fas fa-image"></i> 一键导出长图文
        </button>
        <button onclick="closeModal()" class="flex-1 py-5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">关闭</button>
      </div>
    </div>
  </div>
</div>

<script>
// 主题切换
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

// 当前日期
const today = new Date();
document.getElementById("today").textContent = `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;

// 分类 & 数据
let currentFilter = 'all';
let allMaterials = [];

// 模拟从热榜 API 抓取热点（真实项目中替换为 fetch）
async function fetchHotTopics() {
  // 这里用免费聚合热榜 API 示例（imsyy/DailyHotApi 或类似）
  // 实际可替换为：https://hot.imsyy.top/api 或 https://api.tianapi.com/hot/douyin
  try {
    // 示例：聚合热榜 API (支持抖音、微博、百度等)
    const res = await fetch('https://hot.imsyy.top/api'); // 或其他免费热榜 API
    const data = await res.json();
    return data.data || []; // 假设返回 {data: [{title, hot, tag, ...}]}
  } catch (e) {
    console.warn('热榜 API 拉取失败，使用 fallback 数据');
    return [
      {title: "315双氧水鸡爪事件后续", hot: 9999999, tag: "news"},
      {title: "2026考研国家线大涨", hot: 8888888, tag: "yanjiu"},
      {title: "山系机能风穿搭爆火", hot: 7777777, tag: "douyin"},
      // ... 可扩展更多
    ];
  }
}

// 生成10条素材（基于热榜 + 模板）
async function refreshData() {
  const hotTopics = await fetchHotTopics();
  allMaterials = hotTopics.slice(0, 20).map((topic, i) => generateMaterialFromTopic(topic, i+1));
  filterCategory(currentFilter);
}

function generateMaterialFromTopic(topic, id) {
  const {title, tag = 'douyin'} = topic;
  let category = tag.includes('douyin') ? 'douyin' : tag.includes('news') || tag.includes('央视') ? 'news' : 'yanjiu';

  return {
    id,
    title: title,
    category,
    image: `https://picsum.photos/seed/${id}/800/600`,
    oral: `大家好！今天热搜第一是「${title}」！${getRandomOralPrefix()} 快来看看是怎么回事～点赞收藏不迷路！`,
    article: `【${title}】\n\n今日热榜爆款话题：${title}\n热度指数：极高\n\n事件概述：${getRandomContent(title)}\n\n为什么这么火？大学生/研究生群体高度关注，因为...\n\n你怎么看？评论区聊聊～`
  };
}

function getRandomOralPrefix() {
  const prefixes = ["震惊！", "太离谱了！", "姐妹们冲啊！", "考研党注意！", "这波操作666", "热搜屠榜了！"];
  return prefixes[Math.floor(Math.random()*prefixes.length)];
}

function getRandomContent(title) {
  return `（示例内容：${title}相关深度解读。实际可接入新闻API补充真实详情）`;
}

// 渲染 & 过滤
function filterCategory(cat) {
  currentFilter = cat;
  document.querySelectorAll('.tab-active').forEach(el => el.classList.remove('tab-active'));
  event.target?.classList.add('tab-active') || document.querySelector(`button[onclick="filterCategory('${cat}')"]`)?.classList.add('tab-active');

  const filtered = cat === 'all' ? allMaterials : allMaterials.filter(m => m.category === cat);
  const grid = document.getElementById("materialGrid");
  grid.innerHTML = "";

  filtered.forEach(item => {
    const card = document.createElement("div");
    card.className = "card rounded-3xl overflow-hidden cursor-pointer shadow-lg";
    card.innerHTML = `
      <img src="${item.image}" class="w-full h-56 object-cover" alt="${item.title}">
      <div class="p-6">
        <h3 class="text-xl font-semibold mb-4 line-clamp-2">${item.title}</h3>
        <span class="inline-block px-3 py-1 bg-zinc-700 rounded-full text-sm mb-4">${item.category === 'douyin' ? '抖音爆款' : item.category === 'news' ? '新闻热点' : '研究生'}</span>
        <button onclick="showDetail(${item.id})" class="w-full py-4 bg-[var(--accent)] hover:bg-emerald-600 rounded-2xl font-medium flex items-center justify-center gap-2">
          <i class="fas fa-eye"></i> 查看文案 & 导出
        </button>
      </div>
    `;
    card.onclick = () => showDetail(item.id);
    grid.appendChild(card);
  });
}

let currentItem = null;

function showDetail(id) {
  currentItem = allMaterials.find(m => m.id === id);
  if (!currentItem) return;

  document.getElementById("modalTitle").textContent = currentItem.title;
  document.getElementById("modalImage").innerHTML = `<img src="${currentItem.image}" class="w-full" alt="">`;
  document.getElementById("oralScript").textContent = currentItem.oral;
  document.getElementById("fullArticle").innerHTML = `<p class="whitespace-pre-wrap">${currentItem.article}</p>`;

  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("modal").classList.remove("flex");
}

function copyOral() {
  navigator.clipboard.writeText(currentItem.oral);
  alert("口播文案已复制！");
}

function copyArticle() {
  navigator.clipboard.writeText(currentItem.article);
  alert("完整文章已复制！");
}

// 一键导出长图文（生成可复制的 HTML 片段）
function exportLongImage() {
  if (!currentItem) return;

  const exportHtml = `
<div style="max-width:800px; margin:0 auto; padding:40px; background:#fff; color:#000; font-family:system-ui;">
  <h1 style="font-size:32px; font-weight:bold; text-align:center; margin-bottom:30px;">${currentItem.title}</h1>
  <img src="${currentItem.image}" style="width:100%; border-radius:16px; margin-bottom:30px;">
  <div style="background:#f0fdf4; padding:24px; border-radius:16px; margin-bottom:30px;">
    <strong style="color:#059669; display:block; margin-bottom:12px; font-size:18px;">口播文案（视频用）</strong>
    <p style="white-space:pre-wrap; line-height:1.8;">${currentItem.oral}</p>
  </div>
  <div>
    <strong style="color:#059669; display:block; margin-bottom:12px; font-size:18px;">完整文章内容</strong>
    <p style="line-height:1.8; white-space:pre-wrap;">${currentItem.article}</p>
  </div>
</div>
  `;

  navigator.clipboard.writeText(exportHtml);
  alert("长图文 HTML 已复制！可粘贴到笔记工具生成图片，或直接发公众号/小红书～");
}

// 初始化
refreshData();
</script>

</body>
</html>
